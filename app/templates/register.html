{% extends "base.html" %}
{% block title %}Register - AI Tutor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 p-4 mt-4">
            <h3 class="text-center mb-3">Create Account</h3>
            <form action="/auth/register" method="POST">

                <!-- Added First Name and Last Name inputs side-by-side -->
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" required placeholder="Lukas">
                    </div>
                    <div class="col">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" required placeholder="Schmidt">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="name@example.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-success w-100 py-2">Sign Up</button>
            </form>

            <div class="text-center mt-3">
                <p class="text-muted small mb-0">Already have an account? <a href="/login" class="text-decoration-none fw-semibold">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
